name: Promote

# push only — no workflow_dispatch. A manual dispatch would bypass the PR/CI
# gate entirely (nothing re-runs lint/test for a workflow_dispatch event),
# undermining the whole point of the branch rulesets. The only way to deploy
# is a push to main/development, which per the rulesets can only happen via
# a PR merge that already passed its required checks.
on:
  push:
    branches: [main, development]

# Avoid two deploys racing against the same self-hosted backend; let the
# latest push on a given branch win rather than queuing every intermediate
# commit. Scoped per-branch so a dev deploy can't cancel a production one.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main -> production, development -> development. Each GitHub
    # Environment is locked via deployment_branch_policy to only accept
    # deploys from its matching branch (see repo Settings -> Environments,
    # or .github/scripts/apply-branch-rulesets.sh), so a workflow run on the
    # wrong branch can't resolve the other environment's secrets even if
    # this expression above is ever misconfigured. Belt-and-suspenders
    # alongside the main/development branch rulesets (repo Settings ->
    # Rules), which are the actual merge gate now that this repo is public.
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm and Node
        uses: ./.github/actions/setup-node-pnpm

      # No lint/test step here — ci.yml already required both to pass before
      # this commit could be merged into development or main, so re-running
      # them here would just be redundant compute.

      # `pnpm run deploy` runs `convex deploy --cmd 'pnpm run build'
      # --cmd-url-env-var-name VITE_CONVEX_URL`, which fetches VITE_CONVEX_URL
      # and VITE_CONVEX_SITE_URL live from the deployment's canonical-urls API
      # and injects them into the build itself — so only the two credentials
      # for reaching the deployment are needed here. The Convex CLI loads
      # .env.local itself, no step-level `env:` required.
      #
      # This build's own `tsc -b` (via package.json's build script) is a
      # separate typecheck from lint's plain `tsc` — different mode (project
      # references), potentially different results — so it's deliberately
      # NOT deduped away as "redundant"; removing it would mean the actual
      # deploy artifact's build-mode types are never checked anywhere.
      - name: Write Convex env file
        run: |
          cat <<EOF > .env.local
          CONVEX_SELF_HOSTED_URL=${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY=${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}
          EOF

      - name: Deploy
        run: pnpm run deploy

  # Only reachable if `deploy` above succeeded — needs: deploy plus
  # if: success() means a failed/deploy-broken development push never gets a
  # PR opened or updated into main. The real merge block comes from main's
  # ruleset requiring this workflow's "deploy" check to be green AND the
  # development environment to have a successful deployment for the PR's
  # head SHA — this job just makes sure a PR actually exists to carry that.
  create:
    needs: deploy
    if: success() && github.ref_name == 'development'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # fetch-depth: 0 — compute-next-version needs full history + tags to
      # scan commits since the last release.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        uses: ./.github/actions/compute-next-version

      - name: Open or update promotion PR
        env:
          # Same reasoning as auto-pr.yml: a PR opened with the default
          # GITHUB_TOKEN shows as authored by github-actions[bot], which
          # GitHub holds for manual approval before pull_request-triggered
          # workflows run on it. Nothing currently gates on a check running
          # against this specific PR (main's required checks come from the
          # push-triggered deploy run, not a pull_request event) — but using
          # the same real-user PAT here too keeps this PR from behaving
          # differently everywhere else a "bot-authored" PR looks different
          # (review UI, CODEOWNERS routing, etc.), for the same one-time
          # setup cost.
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
          NEXT_TAG: ${{ steps.version.outputs.tag }}
          CHANGELOG: ${{ steps.version.outputs.changelog }}
        run: |
          title="chore: release ${NEXT_TAG}"
          body_file="$(mktemp)"
          {
            echo "Automated promotion PR — merging this deploys to production and tags the release."
            echo
            echo "## What's included"
            echo
            echo "$CHANGELOG"
          } > "$body_file"

          # Edit in place if a promotion PR is already open, rather than the
          # old "already open, nothing to do" no-op — daily feature velocity
          # means more commits routinely land on development before someone
          # gets to merging the promotion PR, and each one can change the
          # proposed version (e.g. a feat landing after only fixes were
          # queued bumps minor instead of patch) and always changes the
          # changelog, so the open PR needs to stay in sync, not go stale.
          existing_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --head development --base main --state open --json number --jq '.[0].number // empty')"

          if [ -n "$existing_number" ]; then
            gh pr edit "$existing_number" --repo "$GITHUB_REPOSITORY" --title "$title" --body-file "$body_file"
            echo "Updated PR #$existing_number: $title"
            exit 0
          fi

          if ! gh pr create --repo "$GITHUB_REPOSITORY" --head development --base main \
            --title "$title" --body-file "$body_file"; then
            echo "No PR created (likely no commits ahead of main yet)."
          fi

  # Only reachable if `deploy` above succeeded on a push to main — i.e. the
  # promotion PR from `create` just got merged and actually deployed to
  # production cleanly. Recomputes the version fresh against main's new
  # history rather than passing it from the `create` job's earlier run on
  # development — those are two separate workflow runs (different pushes),
  # so there's no direct way to pass state between them; recomputing is the
  # only option, and it naturally lands on the same number since main only
  # ever advances via this exact gated promotion PR.
  tag:
    needs: deploy
    if: success() && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute released version
        id: version
        uses: ./.github/actions/compute-next-version

      - name: Tag and create GitHub Release
        env:
          # Default token is fine here (unlike the create job above) —
          # nothing in this repo listens for a tag push or a release-created
          # event, so the "resources created by GITHUB_TOKEN don't trigger
          # further workflow runs" anti-recursion rule doesn't bite us.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ steps.version.outputs.tag }}
          CHANGELOG: ${{ steps.version.outputs.changelog }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT_TAG" -m "Release $NEXT_TAG"
          git push origin "$NEXT_TAG"

          notes_file="$(mktemp)"
          echo "$CHANGELOG" > "$notes_file"
          gh release create "$NEXT_TAG" --repo "$GITHUB_REPOSITORY" --title "$NEXT_TAG" --notes-file "$notes_file"
