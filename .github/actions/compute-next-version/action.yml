name: Compute next version
description: >
  Computes the next vX.Y.Z from Conventional Commits since the last v* tag, and a changelog grouped by type. Requires a checkout with fetch-depth: 0 (needs full history + tags) to have already run in this job.

outputs:
  version:
    description: "Next version, no leading v (e.g. 1.3.0)"
    value: ${{ steps.compute.outputs.version }}
  tag:
    description: "Next tag, with leading v (e.g. v1.3.0)"
    value: ${{ steps.compute.outputs.tag }}
  changelog:
    description: "Markdown changelog for the commits since the last tag"
    value: ${{ steps.compute.outputs.changelog }}

runs:
  using: composite
  steps:
    - id: compute
      shell: bash
      run: |
        set -euo pipefail
        git fetch --tags --force --quiet

        latest_tag="$(git tag -l 'v*' | sort -V | tail -1)"

        # No release yet: match the v0.1.0 starting convention already used
        # by ai-cloud-operator's auto-tag.yml, regardless of what's in the
        # first batch of commits — a fresh v0.0.1 reads as "barely anything
        # here yet", v0.1.0 reads as "first real release".
        if [ -z "$latest_tag" ]; then
          next="0.1.0"
          range="HEAD"
        else
          range="${latest_tag}..HEAD"
          base="${latest_tag#v}"
          IFS=. read -r major minor patch <<< "$base"

          bump="patch"
          while IFS= read -r subject; do
            [ -z "$subject" ] && continue
            if [[ "$subject" =~ ^[a-zA-Z]+(\([a-zA-Z0-9_.-]+\))?!: ]]; then
              bump="major"
            elif [[ "$subject" =~ ^feat(\([a-zA-Z0-9_.-]+\))?: ]] && [ "$bump" != "major" ]; then
              bump="minor"
            fi
          # tformat, NOT format: `format:` omits the trailing newline after
          # the LAST entry, and `while read` silently drops a final line
          # with no newline before it — tformat always terminates every
          # entry so the last commit doesn't get dropped from the scan.
          done < <(git log --reverse --no-merges --pretty=tformat:'%s' "$range")

          # A "BREAKING CHANGE:" footer counts even without a `!` in the
          # subject line — Conventional Commits allows either form.
          if git log "$range" --pretty=format:'%b' | grep -q '^BREAKING CHANGE:'; then
            bump="major"
          fi

          case "$bump" in
            major) next="$((major + 1)).0.0" ;;
            minor) next="${major}.$((minor + 1)).0" ;;
            patch) next="${major}.${minor}.$((patch + 1))" ;;
          esac
        fi
        next_tag="v${next}"

        # Single pass over the range, bucketed by prefix — a commit lands in
        # exactly one section. Anything not feat:/fix: (chore:, docs:, plain
        # merge commits, whatever) falls into "Other Changes" rather than
        # being silently dropped from the changelog.
        features=() fixes=() others=()
        while IFS='|' read -r hash subject; do
          [ -z "$subject" ] && continue
          case "$subject" in
            feat*!:*) features+=("- **BREAKING** ${subject#*: } (${hash})") ;;
            feat*:*) features+=("- ${subject#*: } (${hash})") ;;
            fix*!:*) fixes+=("- **BREAKING** ${subject#*: } (${hash})") ;;
            fix*:*) fixes+=("- ${subject#*: } (${hash})") ;;
            *) others+=("- ${subject} (${hash})") ;;
          esac
        done < <(git log --reverse --no-merges --pretty=tformat:'%h|%s' "$range")

        changelog=""
        if [ "${#features[@]}" -gt 0 ]; then
          changelog+=$'### Features\n\n'
          for l in "${features[@]}"; do changelog+="$l"$'\n'; done
          changelog+=$'\n'
        fi
        if [ "${#fixes[@]}" -gt 0 ]; then
          changelog+=$'### Bug Fixes\n\n'
          for l in "${fixes[@]}"; do changelog+="$l"$'\n'; done
          changelog+=$'\n'
        fi
        if [ "${#others[@]}" -gt 0 ]; then
          changelog+=$'### Other Changes\n\n'
          for l in "${others[@]}"; do changelog+="$l"$'\n'; done
          changelog+=$'\n'
        fi
        if [ -z "$changelog" ]; then
          changelog="No changes since ${latest_tag:-the initial commit}."$'\n'
        fi

        echo "Latest tag: ${latest_tag:-<none>}; next: $next_tag"

        {
          echo "version=$next"
          echo "tag=$next_tag"
          echo "changelog<<CHANGELOG_EOF"
          echo "$changelog"
          echo "CHANGELOG_EOF"
        } >> "$GITHUB_OUTPUT"
