name: Auto PR

# Promotion flow: feature/* -> development -> main. Every push to a feature
# branch opens (or reuses) a PR into development. The development -> main
# leg lives in deploy.yml instead (its open-pr-to-main job), gated on that
# push's development deploy actually succeeding — see the comment there.
on:
  push:
    branches:
      - "feature/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Open or reuse PR into development
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          head="${{ github.ref_name }}"
          base="development"

          existing="$(gh pr list --head "$head" --base "$base" --state open --json number --jq 'length')"
          if [ "$existing" != "0" ]; then
            echo "PR from $head into $base already open, nothing to do."
            exit 0
          fi

          # Not using --fill: it shells out to `git` to diff against the base
          # branch for a title/body, which needs full history — but
          # actions/checkout defaults to a shallow, single-branch clone, so
          # origin/development isn't available and --fill errors out.
          # HEAD's own last commit message is available regardless of
          # fetch-depth, so use that for the title instead.
          title="$(git log -1 --format=%s)"
          if ! gh pr create --head "$head" --base "$base" --title "$title" --body "Automated PR: $head -> $base."; then
            echo "No PR created (likely no commits ahead of $base yet)."
          fi
