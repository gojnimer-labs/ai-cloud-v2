name: Auto PR

# Promotion flow: feature/* -> development -> main. Every push to a feature
# branch opens (or reuses) a PR into development; every push to development
# opens (or reuses) a PR into main. Actual deploys are handled by deploy.yml
# on push to main/development — this workflow only ever opens PRs, it never
# merges anything.
on:
  push:
    branches:
      - "feature/**"
      - development

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Open or reuse PR
        # The org's Actions policy blocks the built-in GITHUB_TOKEN from
        # creating PRs (org Settings -> Actions -> General, needs an org
        # admin to change), so this uses a personal access token stored as
        # AUTO_PR_TOKEN instead — a real user token isn't subject to that
        # policy. Create one at https://github.com/settings/tokens with
        # `repo` scope (classic) or Contents+Pull requests write
        # (fine-grained, scoped to this repo), then:
        #   gh secret set AUTO_PR_TOKEN
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
        run: |
          head="${{ github.ref_name }}"
          if [[ "$head" == feature/* ]]; then
            base="development"
          else
            base="main"
          fi

          existing="$(gh pr list --head "$head" --base "$base" --state open --json number --jq 'length')"
          if [ "$existing" != "0" ]; then
            echo "PR from $head into $base already open, nothing to do."
            exit 0
          fi

          # --fill pulls title/body from the branch's commits. A feature
          # branch with no commits ahead of dev (e.g. just-created) has
          # nothing to fill from, so skip cleanly instead of failing the run.
          if ! gh pr create --head "$head" --base "$base" --fill; then
            echo "No PR created (likely no commits ahead of $base yet)."
          fi
