name: Deploy

on:
  push:
    branches: [main, development]
  workflow_dispatch: {}

# Avoid two deploys racing against the same self-hosted backend; let the
# latest push on a given branch win rather than queuing every intermediate
# commit. Scoped per-branch so a dev deploy can't cancel a production one.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # main -> production, development -> development. Each GitHub
    # Environment is locked via deployment_branch_policy to only accept
    # deploys from its matching branch (see repo Settings -> Environments),
    # so a workflow run on the wrong branch can't resolve the other
    # environment's secrets even if this expression or the trigger above is
    # ever misconfigured. (Required-reviewer/wait-timer protection rules
    # need a paid plan for private repos, so this branch lock is the
    # enforcement layer we have.)
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reads the pinned version from package.json's "packageManager" field.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # kysely (via better-auth) needs >=22, commander >=22.12; matches
          # the Node version this app is developed against.
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & typecheck
        run: pnpm run lint

      # `pnpm run deploy` runs `convex deploy --cmd 'pnpm run build'
      # --cmd-url-env-var-name VITE_CONVEX_URL`, which fetches VITE_CONVEX_URL
      # and VITE_CONVEX_SITE_URL live from the deployment's canonical-urls API
      # and injects them into the build itself — so only the two credentials
      # for reaching the deployment are needed here. The Convex CLI loads
      # .env.local itself, no step-level `env:` required.
      - name: Write Convex env file
        run: |
          cat <<EOF > .env.local
          CONVEX_SELF_HOSTED_URL=${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY=${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}
          EOF

      - name: Deploy
        run: pnpm run deploy

  # Only reachable if `deploy` above succeeded — needs: deploy plus
  # if: success() means a failed/lint-broken/deploy-broken development push
  # never gets a PR opened or updated into main. This is the closest gate
  # available without branch protection/rulesets (paywalled on this private
  # repo's Free plan, see deploy job's environment comment): a PR into main
  # only exists for commits that already deployed cleanly to development.
  # Caveat: it can't retroactively pull a bad commit out of an ALREADY-OPEN
  # main PR if a later push to development fails deploy — GitHub still
  # tracks that PR's head at whatever development's tip is.
  open-pr-to-main:
    needs: deploy
    if: success() && github.ref_name == 'development'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Open or reuse PR into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing="$(gh pr list --repo "$GITHUB_REPOSITORY" --head development --base main --state open --json number --jq 'length')"
          if [ "$existing" != "0" ]; then
            echo "PR from development into main already open, nothing to do."
            exit 0
          fi

          if ! gh pr create --repo "$GITHUB_REPOSITORY" --head development --base main --fill; then
            echo "No PR created (likely no commits ahead of main yet)."
          fi
