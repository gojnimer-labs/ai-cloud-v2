name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Avoid two deploys racing against the same self-hosted backend; let the
# latest push win rather than queuing every intermediate commit.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Lets you attach required-reviewer protection rules to this deploy from
    # GitHub repo Settings → Environments, if you want a manual gate later.
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & typecheck
        run: npm run lint

      # Both halves of `npm run deploy` read this file directly rather than
      # process.env: the Convex CLI loads .env.local itself (it doesn't need
      # step-level `env:`), and @convex-dev/static-hosting's `upload --build`
      # gets VITE_CONVEX_URL from the same file via its getEnvFileConvexUrl()
      # helper. Writing it once here is the single source for both.
      #
      # CONVEX_SELF_HOSTED_URL and VITE_CONVEX_URL are the same backend URL —
      # two env var names two different tools expect, not two secrets to
      # configure — so only one secret is needed for it.
      - name: Write Convex env file
        run: |
          cat <<EOF > .env.local
          CONVEX_SELF_HOSTED_URL=${{ secrets.CONVEX_SELF_HOSTED_URL }}
          CONVEX_SELF_HOSTED_ADMIN_KEY=${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}
          VITE_CONVEX_URL=${{ secrets.CONVEX_SELF_HOSTED_URL }}
          VITE_CONVEX_SITE_URL=${{ secrets.VITE_CONVEX_SITE_URL }}
          EOF

      - name: Deploy
        run: npm run deploy
