name: Auto PR

# Promotion flow: feature/* -> development -> main. Every push to a feature
# branch opens (or reuses) a PR into development. The development -> main
# leg lives in promote.yml instead (its create job), gated on that push's
# development deploy actually succeeding — see the comment there.
on:
  push:
    branches:
      - "feature/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Open or reuse PR into development
        env:
          # A PR opened with the default GITHUB_TOKEN shows as authored by
          # github-actions[bot], which GitHub now holds for manual approval
          # before any pull_request-triggered workflow (ci.yml's lint/test)
          # runs on it — the PR just sits with zero checks until someone
          # clicks "Approve and run". AUTO_PR_TOKEN is a real-user PAT
          # (fine-grained, scoped to this repo, Pull requests: read/write
          # only), so the PR shows as opened by a real account instead and
          # never hits that gate.
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
        run: |
          head="${{ github.ref_name }}"
          base="development"

          existing="$(gh pr list --head "$head" --base "$base" --state open --json number --jq 'length')"
          if [ "$existing" != "0" ]; then
            echo "PR from $head into $base already open, nothing to do."
            exit 0
          fi

          # Not using --fill: it shells out to `git` to diff against the base
          # branch for a title/body, which needs full history — but
          # actions/checkout defaults to a shallow, single-branch clone, so
          # origin/development isn't available and --fill errors out.
          # HEAD's own last commit message is available regardless of
          # fetch-depth, so use that for the title instead.
          title="$(git log -1 --format=%s)"
          if ! gh pr create --head "$head" --base "$base" --title "$title" --body "Automated PR: $head -> $base."; then
            echo "No PR created (likely no commits ahead of $base yet)."
          fi
